backend:
  name: github
  repo: mwanawasa15/masaiti-2026 # e.g., mwanawasa/masaiti-2026
  branch: main
  base_url: https://api.github.com
  site_domain: lyuumbo-masaiti-2026.pages.dev

media_folder: "images"
public_folder: "/images"

collections:
  - name: "blog"
    label: "Campaign Updates"
    folder: "updates"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Body", name: "body", widget: "markdown"}
